# GitHub Actions – Deploy GitHub Pages
#
# Triggered automatically whenever:
#   • a new game JSON is pushed to data/games/
#   • the website source (docs/) is updated
#
# Also runnable manually via "Run workflow" in the GitHub Actions UI.

name: Deploy Stats Website

on:
  push:
    branches: [main]
    paths:
      - "data/games/**"
      - "docs/**"
      - "scripts/build_index.py"
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the rebuilt index back to the branch
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild games index
        run: python scripts/build_index.py

      - name: Commit updated index (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/js/games-index.js
          git diff --cached --quiet || git commit -m "chore: rebuild games-index.js [skip ci]"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
